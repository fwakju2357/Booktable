           RESET & GLOBAL STYLES
           ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-main: #fcfbfd;          
            --bg-card: #ffffff;          
            --primary-pink: #f7cbdc;     
            --point-dark: #222222;       
            --text-main: #2b2b2b;
            --text-muted: #76737a;
            --border-color: #eae7ec;
            --point-red: #ff4d4d;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .hidden {
            display: none !important;
        }

        /* ==========================================
           NOTICE BANNER (계좌 안내 - 오직 번호만 복사)
           ========================================== */
        .deposit-notice {
            background-color: var(--point-dark);
            color: #ffffff;
            text-align: center;
            padding: 1.4rem 1rem;
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .deposit-notice strong {
            color: var(--point-red);
            font-weight: 700;
            cursor: pointer;
            padding: 0.2rem 0.6rem;
            background-color: rgba(255, 77, 77, 0.15);
            border-radius: 6px;
            transition: all 0.2s ease;
            display: inline-block;
        }
        .deposit-notice strong:hover {
            background-color: rgba(255, 77, 77, 0.3);
            transform: scale(1.02);
        }

        /* ==========================================
           NAVIGATION BAR
           ========================================== */
        .shop-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            border-bottom: 1px solid var(--border-color);
            background-color: rgba(252, 251, 253, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .shop-nav .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--point-dark);
            letter-spacing: -0.5px;
        }

        .shop-nav .subtitle {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* ==========================================
           HEADER SECTION
           ========================================== */
        .shop-header {
            text-align: center;
            padding: 5rem 1rem 3rem 1rem;
            background: radial-gradient(circle at center, var(--primary-pink) 0%, transparent 70%);
            background-size: 100% 400px;
            background-repeat: no-repeat;
        }

        .brand-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--point-dark);
            margin-bottom: 0.8rem;
            letter-spacing: -1px;
        }

        .brand-subtitle {
            color: var(--text-muted);
            font-size: 1.05rem;
            font-weight: 400;
        }

        /* ==========================================
           ALBUM GRID & CARD
           ========================================== */
        .album-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 3rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5% 5rem 5%;
        }

        .album-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 2.2rem 2rem;
            border: 1px solid var(--border-color);
            cursor: pointer;
            position: relative; /* SVG 안착용 기준점 */
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.4s ease;
            text-align: center;
            overflow: hidden;
        }

        .album-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(118, 115, 122, 0.15);
            border-color: #d1cbd4;
        }

        .album-case-wrapper {
            position: relative;
            width: 82%;
            margin: 0.6rem auto 1.5rem auto;
            aspect-ratio: 1 / 1;
        }

        .album-cover-box {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border: 1px solid var(--border-color);
        }

        .album-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .album-vinyl-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 24px;
            height: 24px;
            background-color: var(--point-dark);
            border-radius: 50%;
            border: 4px solid var(--bg-card);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .album-card:hover .album-img {
            transform: scale(1.08) rotate(15deg);
        }

        .album-details {
            padding-top: 0.5rem;
            position: relative;
            z-index: 2;
        }

        .album-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--point-dark);
            margin-bottom: 0.4rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .album-referrer {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ==========================================
           DETAIL PAGE (가로폭 확장 레이아웃)
           ========================================== */
        #detail-page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 3rem 5%;
        }

        #back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.6rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            margin-bottom: 2.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        #back-btn:hover {
            border-color: var(--point-dark);
            background-color: var(--point-dark);
            color: #ffffff;
        }

        .player-layout {
            display: flex;
            gap: 4rem;
            align-items: center;
            background-color: var(--bg-card);
            border-radius: 24px;
            padding: 5rem 4.5rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 40px rgba(118, 115, 122, 0.08);
            position: relative; /* SVG 안착용 기준점 */
            overflow: hidden;
        }

        .player-visual {
            flex: 1;
            display: flex;
            justify-content: center;
            min-width: 280px;
            position: relative;
            z-index: 2;
        }

        .cd-case {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            overflow: hidden;
            border: 12px solid var(--primary-pink);
            box-shadow: 0 10px 30px rgba(0,0,0,0.06);
            animation: rotateCD 25s linear infinite;
        }

        #detail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.9;
        }

        .cd-circle-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 45px;
            height: 45px;
            background-color: var(--point-dark);
            border-radius: 50%;
            border: 6px solid #ffffff;
        }

        @keyframes rotateCD {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .player-info {
            flex: 1.5;
            position: relative;
            z-index: 2;
        }

        .track-tag {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 700;
            letter-spacing: 1.5px;
            margin-bottom: 0.5rem;
        }

        #detail-title {
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 2rem;
            color: var(--point-dark);
            border-bottom: 2px solid var(--point-dark);
            padding-bottom: 1rem;
            word-break: keep-all;
        }

        .meta-table {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.6rem;
            border-bottom: 1px dashed var(--border-color);
        }

        .meta-label {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .meta-value {
            font-size: 0.95rem;
            color: var(--text-main);
            font-weight: 500;
        }

        /* 추천 이유 박스 최적화 */
        .liner-notes {
            background-color: var(--bg-main);
            padding: 1.8rem;
            border-radius: 12px;
            border-left: 4px solid var(--primary-pink);
            margin-bottom: 2rem;
            width: 100%;
        }

        .liner-notes h3 {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
            letter-spacing: 0.5px;
        }

        #detail-description {
            font-size: 0.98rem;
            color: var(--text-main);
            line-height: 1.8;
            word-break: keep-all;
            white-space: pre-wrap;
            text-align: justify;
        }

        .btn-purchase-link {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #ff477e, #ff6b6b);
            color: white;
            text-decoration: none;
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            box-shadow: 0 8px 20px rgba(255, 71, 126, 0.3);
            transition: all 0.3s ease;
            text-align: center;
        }

        .btn-purchase-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 26px rgba(255, 71, 126, 0.4);
            filter: brightness(1.05);
        }

        /* ==========================================
           RESPONSIVE DESIGN
           ========================================== */
        @media (max-width: 850px) {
            .player-layout {
                flex-direction: column;
                padding: 4rem 2rem;
                gap: 2.5rem;
            }
            
            .player-visual {
                min-width: unset;
            }
            
            .cd-case {
                width: 240px;
                height: 240px;
            }
            
            .brand-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

            {"id": 16, "title": "팀 켈러의 예수, 예수", "referrer": "연한흠 목사님", "image": "image16.jpg", "author": "팀 켈러", "publisher": "두란노", "price": "11,000원", "description": "읽다보면 어느새 예수님과 더 가까워져 있는 책. 예수님을 '다시'만나고 싶은 사람에게 추천"},
            {"id": 17, "title": "그리스도 우리의 생명", "referrer": "김재달 목사님", "image": "image17.jpg", "author": "마이클 리브스", "publisher": "복있는사람", "price": "10,000원", "description": "삼위일체 교리와 기독론을 우리 삶과 신앙에 이토록 적실하게 쓴 책을 본 적이 없습니다. :)"},
            {"id": 18, "title": "예배", "referrer": "간사즈", "image": "image18.jpg", "author": "존 맥아더", "publisher": "아가페", "price": "12,000원", "description": "영과 진리로 드리는 예배. 익숙해진 예배를 돌아보고 하나님 중심의 예배와 삶을 세워 가고 싶은 청년들에게 추천합니다."},
            {"id": 19, "title": "내 마음 그리스도의 집", "referrer": "간사즈", "image": "image19.jpg", "author": "로버트 멍어", "publisher": "IVP", "price": "8,000원", "description": "예수님에 대해 막 알아가고 계신 분에게도, 신앙생활을 오래 해온 분들에게도 추천합니다.어려운 말 하나 없이 그림과 함께 보는 짧고 단순한 이야기이지만, 예수님을 모르고, 잊고, 떄로는 피하며 살던 모든 순간에 여전히 애닳는 사랑으로 여러분을 기다리고 계시는 예수님을 마주하게 되는 책입니다."}
        ];

        // 회전하며 네 모서리를 감쌀 고정 성경말씀 텍스트 정의
        const scriptureText = "Therefore, since we are surrounded by such a great cloud of witnesses, let us throw off everything that hinders and the sin that so easily entangles. And let us run with perseverance the race marked out for us. Hebrews 12:1 — ";

        const mainPage = document.getElementById('main-page');
        const detailPage = document.getElementById('detail-page');
        const bookList = document.getElementById('book-list');
        const backBtn = document.getElementById('back-btn');
        const detailPlayerBox = document.getElementById('detail-player-box');

        // 오직 숫자만 깔끔하게 복사되도록 핸들링
        function copyToClipboard(accountNumber) {
            navigator.clipboard.writeText(accountNumber).then(() => {
                alert("계좌번호가 복사되었습니다!\n" + accountNumber);
            }).catch(err => {
                const tempInput = document.createElement("input");
                tempInput.value = accountNumber;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand("copy");
                document.body.removeChild(tempInput);
                alert("계좌번호가 복사되었습니다!\n" + accountNumber);
            });
        }

        // 박스 실시간 크기에 맞춰 끊김 없이 돌아가는 SVG 텍스트 패스를 생성하는 함수
        function applySeamlessTextBorder(element, text) {
            if (!element) return;
            
            // 기존에 생성되어 있던 border SVG가 있다면 초기화
            const existingSvg = element.querySelector('.svg-seamless-border');
            if (existingSvg) existingSvg.remove();

            const w = element.offsetWidth;
            const h = element.offsetHeight;
            if (!w || !h) return;

            const padding = 10; // 테두리 안쪽 여백 설정
            const uniqueId = 'path-' + Math.random().toString(36).substr(2, 9);
            
            // 사각형 모서리를 정방향으로 순환하는 벡터 패스선 설계 (시작점 좌상단 -> 우상단 -> 우하단 -> 좌하단 -> 폐합)
            const pathD = `M ${padding} ${padding} H ${w - padding} V ${h - padding} H ${padding} Z`;
            
            // 텍스트가 끊김 없이 트랙을 가득 채우도록 넉넉하게 반복 배치
            const perimeter = 2 * (w + h);
            const repeatCount = Math.ceil(perimeter / 600) + 1; 
            const repeatedText = text.repeat(repeatCount);

            const svgHtml = `
                <svg class="svg-seamless-border" width="${w}" height="${h}" style="position: absolute; top: 0; left: 0; pointer-events: none; width: 100%; height: 100%; z-index: 1;">
                    <path id="${uniqueId}" d="${pathD}" fill="none" stroke="none" />
                    <text font-size="9px" fill="#bcaec4" font-family="'DM Serif Display', serif" letter-spacing="0.8px" opacity="0.75">
                        <textPath href="#${uniqueId}">${repeatedText}</textPath>
                    </text>
                </svg>
            `;
            element.insertAdjacentHTML('afterbegin', svgHtml);
        }

        function renderBooks() {
            bookList.innerHTML = '';
            books.forEach(book => {
                const albumCard = document.createElement('div');
                albumCard.className = 'album-card';
                albumCard.onclick = () => showDetail(book);

                albumCard.innerHTML = `
                    <div class="album-case-wrapper">
                        <div class="album-cover-box">
                            <img src="${book.image}" alt="${book.title} 표지" class="album-img">
                            <div class="album-vinyl-effect"></div>
                        </div>
                    </div>
                    <div class="album-details">
                        <div class="album-title">${book.title}</div>
                        <div class="album-referrer">추천인: ${book.referrer}</div>
                    </div>
                `;
                bookList.appendChild(albumCard);
            });

            // 카드 레이아웃 렌더링 직후 각 요소의 모서리에 텍스트 주입
            setTimeout(() => {
                document.querySelectorAll('.album-card').forEach(card => {
                    applySeamlessTextBorder(card, scriptureText);
                });
            }, 50);
        }

        function showDetail(book) {
            document.getElementById('detail-img').src = book.image;
            document.getElementById('detail-title').innerText = book.title;
            document.getElementById('detail-author').innerText = book.author;
            document.getElementById('detail-publisher').innerText = book.publisher;
            document.getElementById('detail-referrer').innerText = book.referrer;
            document.getElementById('detail-description').innerText = book.description;
            document.getElementById('detail-price').innerText = book.price;

            mainPage.classList.add('hidden');
            detailPage.classList.remove('hidden');
            window.scrollTo(0, 0);

            // 상세정보 창이 열리고 돔이 구성된 시점에 감싸는 프레임 그리기
            setTimeout(() => {
                applySeamlessTextBorder(detailPlayerBox, scriptureText);
            }, 50);
        }

        backBtn.onclick = () => {
            detailPage.classList.add('hidden');
            mainPage.classList.remove('hidden');
            // 리스트로 돌아왔을 때 깨짐 현상 방지를 위해 재계산
            document.querySelectorAll('.album-card').forEach(card => {
                applySeamlessTextBorder(card, scriptureText);
            });
        };

        // 브라우저 가로길이가 바뀌거나 모바일 회전 시 실시간 테두리 리사이징 매핑
        window.addEventListener('resize', () => {
            document.querySelectorAll('.album-card').forEach(card => {
                applySeamlessTextBorder(card, scriptureText);
            });
            if (!detailPage.classList.contains('hidden')) {
                applySeamlessTextBorder(detailPlayerBox, scriptureText);
            }
        });

        renderBooks();
    </script>
</body>
</html>
